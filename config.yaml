server:
  port: 8420

schedule:
  interval: "@every 1h"
  retention_days: 90

domains:
  - google.com
  - youtube.com
  - facebook.com
  - instagram.com
  - chatgpt.com
  - x.com
  - whatsapp.com
  - reddit.com
  - wikipedia.org
  - amazon.com
  - tiktok.com
  - pinterest.com
  - anthropic.com
  - opencode.ai

providers:
  - name: AdGuard DNS
    ips:
      - 94.140.14.14:53
      - 94.140.15.15:53
    type: udp
    doh_url: https://dns.adguard-dns.com/dns-query

  - name: Cloudflare
    ips:
      - 1.1.1.1:53
      - 1.0.0.1:53
    type: udp
    doh_url: https://cloudflare-dns.com/dns-query

  - name: Quad9
    ips:
      - 9.9.9.9:53
      - 149.112.112.112:53
    type: udp

  - name: Control D
    ips:
      - 76.76.2.0:53
      - 76.76.10.0:53
    type: udp
    doh_url: https://freedns.controld.com/p0

  - name: NextDNS
    ips:
      - 45.90.28.0:53
      - 45.90.30.0:53
    type: udp
    doh_url: https://dns.nextdns.io

  - name: Mullvad
    ips:
      - 194.242.2.2:53
    type: udp
    doh_url: https://dns.mullvad.net/dns-query

  - name: DNSBunker
    ips:
      - 27.123.245.130:53
    type: udp
    doh_url: https://dnsbunker.org/dns-query

  - name: Google
    ips:
      - 8.8.8.8:53
      - 8.8.4.4:53
    type: udp
